[package]
name = "microc"
version = "0.0.1"

[build]
language = "c"
standard = "c99"
compiler = "gcc"
cflags   = ["-Wall", "-Wextra", "-Wno-format", "-Wno-missing-braces", "-Iinclude"]

[build.x86_64-pc-windows-msvc]
ldflags = ["-Llib", "-lsct-win"]

[build.x86_64-unknown-linux-gnu]
ldflags = ["-Llib", "-lsct-elf"]

[dependencies]
